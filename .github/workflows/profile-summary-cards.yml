name: Update GitHub profile stats

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/profile-summary-cards.yml
      - scripts/generate_profile_stats.py
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-summary-cards
  cancel-in-progress: true

jobs:
  generate:
    name: Generate profile stats card
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out profile repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate profile stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/generate_profile_stats.py \
            --username "${{ github.repository_owner }}" \
            --output profile-summary-card-output/default/3-stats.svg

      - name: Validate generated card
        run: |
          test -s profile-summary-card-output/default/3-stats.svg
          grep -q '<svg' profile-summary-card-output/default/3-stats.svg
          if grep -Eq 'ERROR|rate limited|Something went wrong' profile-summary-card-output/default/3-stats.svg; then
            exit 1
          fi

      - name: Commit changed stats
        run: |
          git add profile-summary-card-output/default/3-stats.svg
          if git diff --cached --quiet; then
            echo "Stats are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update GitHub profile stats"
          git push
